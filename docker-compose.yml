version: "3.9"

services:
  web:
    build: .
    container_name: opensid-web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./opensid:/var/www/html
      - ./php/opensid.ini:/etc/php/8.4/apache2/conf.d/99-opensid.ini
      - ./certs:/etc/apache2/ssl
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      db:
        condition: service_healthy
    restart: always

  db:
    image: mariadb:10.11
    container_name: opensid-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 3

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: opensid-phpmyadmin
    restart: always
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "8081:80"
    depends_on:
      - db

volumes:
  db_data:
