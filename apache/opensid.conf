<VirtualHost *:443>
    ServerName sid.kgwilly.my.id
    DocumentRoot /var/www/html

    SSLEngine on
    SSLCertificateFile /etc/apache2/ssl/opensid.crt
    SSLCertificateKeyFile /etc/apache2/ssl/opensid.key

    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"

    <Directory /var/www/html>
        Options FollowSymLinks
        AllowOverride None
        Require all granted

        RewriteEngine On

        RewriteCond %{REQUEST_FILENAME} -f [OR]
        RewriteCond %{REQUEST_FILENAME} -d
        RewriteRule ^ - [L]

        RewriteRule ^ index.php [L]
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/opensid_ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/opensid_ssl_access.log combined
</VirtualHost>
